<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrimonio Francesco & Erica</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body { overflow: hidden; font-family: 'Playfair Display', serif; background: #fdfaf5; }

/* ================= BUSTA CON SIGILLO (APERTURA AUTO) ================= */
#envelope-container {
  position: fixed; inset: 0; background: #fff;
  display: flex; justify-content: center; align-items: center;
  z-index: 100; transition: opacity 1.2s ease;
}
.envelope { position: relative; width: 100vw; height: 100vh; display: flex; overflow: hidden; }
.env-l, .env-r { width: 50%; height: 100%; background: #fff; transition: transform 1.8s cubic-bezier(.645, .045, .355, 1); z-index: 2; }
.env-r { border-left: 1px solid rgba(0,0,0,0.05); box-shadow: -15px 0 30px rgba(0,0,0,0.1); }

/* Sigillo al centro */
#wax-seal {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 110; width: 150px; transition: all 1s ease;
}
#wax-seal img { width: 100%; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }

/* Animazione apertura */
.opened .env-l { transform: translateX(-100%); }
.opened .env-r { transform: translateX(100%); }
.opened #wax-seal { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }

/* ================= SFONDO ORIGINALE ================= */
.invito {
  position: relative; width: 100vw; height: 100vh;
  background: url('Images/sfondo_22.jpg') center center no-repeat;
  background-size: cover;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; transition: opacity 1.5s ease 1s;
}
.opened-ui .invito { opacity: 1; }

/* TESTI SOPRA LO SFONDO (Senza vignetta) */
.header-main {
  text-align: center; margin-top: 7vh; z-index: 5;
  padding: 0 20px;
}
.testo-invito { 
  font-family: 'Libre Baskerville', serif; 
  font-size: 14px; color: #333; 
  margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px;
  text-shadow: 0 2px 4px rgba(255,255,255,0.8);
}

/* Nomi risaltati con Glow morbido */
.nomi2 { 
  font-family: 'Great Vibes', cursive; 
  font-size: clamp(38px, 9vw, 55px); 
  color: #8e7341; 
  line-height: 1.2;
  text-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 5px rgba(255,255,255,0.5);
}

.nomi{
      font-family: 'Cormorant Garamond', serif;
    font-size: clamp(34px, 8vw, 56px);
    margin-bottom: 25px;
    line-height: 1.1;
    color: #8e7341;
    letter-spacing: 5px;
}


/* ================= BOTTONE INFO ================= */
.btn-info-trigger {
  position: absolute; bottom: 6vh;
  padding: 16px 45px; border-radius: 50px;
  background: #8e7341; color: white;
  text-decoration: none; font-weight: bold; letter-spacing: 2px;
  box-shadow: 0 10px 25px rgba(142, 115, 65, 0.4);
  cursor: pointer; z-index: 10; border: none;
  font-family: 'Libre Baskerville', serif; font-size: 12px;
}

/* ================= POPUP INFO ================= */
#popup-info {
  position: fixed; inset: 0;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(12px);
  display: none; justify-content: center; align-items: center;
  z-index: 200; padding: 20px;
}
.popup-content {
  background: white; width: 100%; max-width: 380px;
  padding: 35px 25px; border-radius: 30px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  position: relative;
}
.close-popup { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #aaa; }

.info-data { font-size: 26px; color: #8e7341; margin-bottom: 5px; }
.info-loc { font-family: 'Libre Baskerville', serif; font-size: 15px; margin-bottom: 20px; color: #666; }

#countdown { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
.cd-item { min-width: 60px; }
.cd-num { display: block; font-size: 22px; font-weight: bold; color: #8e7341; border-bottom: 1px solid #eee; }
.cd-lab { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; display: block; }

.btn-popup {
  display: block; width: 100%; padding: 14px; margin-top: 10px;
  border-radius: 12px; text-decoration: none; font-size: 12px;
  font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
}
.btn-cal { background: #f4f1ee; color: #555; }
.btn-maps { background: #5d7c6b; color: white; }
.btn-rsvp { background: #8e7341; color: white; margin-top: 25px; padding: 16px; font-size: 13px; }

</style>
</head>
<body>

<div id="envelope-container">
  <div class="envelope" id="envelope">
    <div class="env-l"></div>
    <div class="env-r"></div>
    <div id="wax-seal">
        <img src="Images/sigilloDoratoTest.png" alt="Sigillo">
    </div>
  </div>
</div>

<section class="invito">
  <div class="header-main">
    <p class="testo-invito">Vi invitiamo a partecipare al nostro matrimonio</p>
    <h1 class="nomi">Francesco Marchione <br> & <br> Erica Di Cianni</h1>
  </div>

  <button class="btn-info-trigger" onclick="togglePopup()">INFO</button>
</section>

<div id="popup-info">
  <div class="popup-content">
    <span class="close-popup" onclick="togglePopup()">×</span>
    <h2 class="info-data">29 Giugno 2026</h2>
    <p class="info-loc">Ore 17:30 - Tenuta Balzano</p>

    <div id="countdown">
      <div class="cd-item"><span class="cd-num" id="d">00</span><span class="cd-lab">Giorni</span></div>
      <div class="cd-item"><span class="cd-num" id="h">00</span><span class="cd-lab">Ore</span></div>
      <div class="cd-item"><span class="cd-num" id="m">00</span><span class="cd-lab">Min</span></div>
      <div class="cd-item"><span class="cd-num" id="s">00</span><span class="cd-lab">Sec</span></div>
    </div>

    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Matrimonio+Francesco+e+Erica&dates=20260629T153000Z/20260629T230000Z&location=Tenuta+Balzano" target="_blank" class="btn-popup btn-cal">📅 Aggiungi al Calendario</a>
    <a href="http://googleusercontent.com/maps.google.com/2" target="_blank" class="btn-popup btn-maps">📍 Apri Posizione Maps</a>
    <a href="https://forms.gle/vvSUfkJgjrLGJP8o8" target="_blank" class="btn-popup btn-rsvp">Conferma Presenza (RSVP)</a>
  </div>
</div>

<script>
// 1. Apertura automatica busta dopo 1 secondo
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('envelope').classList.add('opened');
    document.body.classList.add('opened-ui');
    
    // Rimuove il contenitore busta dopo l'animazione per liberare la memoria
    setTimeout(() => {
      document.getElementById('envelope-container').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('envelope-container').style.display = 'none';
        document.body.style.overflow = 'auto';
      }, 1200);
    }, 2500);
  }, 1000);
});

// 2. Gestione Popup Info
function togglePopup() {
  const pop = document.getElementById('popup-info');
  const isVisible = pop.style.display === 'flex';
  pop.style.display = isVisible ? 'none' : 'flex';
}

// 3. Countdown aggiornato al 29 Giugno 2026
const target = new Date("June 29, 2026 17:30:00").getTime();
setInterval(() => {
  const now = new Date().getTime();
  const diff = target - now;
  if (diff > 0) {
    document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000);
  } else {
    document.getElementById('countdown').innerHTML = "<p>Oggi è il grande giorno!</p>";
  }
}, 1000);
</script>

</body>
</html>
